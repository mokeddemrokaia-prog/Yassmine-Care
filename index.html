<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yassmine Golden Care ✦ إدارة العيادة</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* نفس الألوان والستايل تاع كلوود اللي عجبك */
:root {
  --rose:#d4748e;--rose-deep:#b85572;--rose-light:#f5d0dc;
  --rose-pale:#fdf0f4;--rose-blush:#fce8ef;
  --gold:#c9a96e;--gold-deep:#a07840;--gold-light:#f0e0c0;
  --plum:#7a4d62;--mint:#4db89a;
  --bg:#faf6f8;--surface:#ffffff;
  --text:#2d1a24;--text-mid:#6b3d52;--text-soft:#b08898;
  --border:rgba(212,116,142,.18);
  --shadow:0 4px 24px rgba(180,80,110,.10);
  --radius:16px;--radius-sm:10px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text); padding-bottom: 80px;}

/* إخفاء الصفحات */
.page { display: none; animation: fadeIn 0.3s ease; padding: 20px; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* --- تصميم الشريط السفلي الجديد (أنيق وبسيط) --- */
.bottom-nav {
  position: fixed;
  bottom: 15px;
  left: 15px;
  right: 15px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  height: 65px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(180,80,110,0.2);
  border: 1px solid var(--border);
  z-index: 1000;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text-soft);
  text-decoration: none;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  flex: 1;
}

.nav-item i {
  font-size: 20px;
  margin-bottom: 4px;
}

.nav-item.active {
  color: var(--rose-deep);
}

/* الزر الكبير في الوسط للإضافة */
.nav-add-btn {
  background: linear-gradient(135deg, var(--rose-deep), var(--plum));
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
  margin-top: -35px;
  box-shadow: 0 8px 20px rgba(180,80,110,0.4);
  border: 4px solid var(--bg);
}

/* ستايل البطاقات (نفس كلوود) */
.stat-card { background: #fff; border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 15px; }
.stat-value { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--rose-deep); }
.stat-label { color: var(--text-soft); font-size: 0.9rem; }

.panel { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
.panel-head { padding: 15px; background: var(--rose-pale); color: var(--rose-deep); font-weight: bold; border-bottom: 1px solid var(--border); }
.panel-body { padding: 15px; }

/* الفليتر أو الانبوتس */
.form-control { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--rose-pale); font-family: 'Tajawal'; }
.btn-main { width: 100%; padding: 12px; background: var(--rose-deep); color: white; border: none; border-radius: var(--radius-sm); font-weight: bold; cursor: pointer; }

</style>
</head>
<body>

<div id="home" class="page active">
    <div style="text-align: center; margin-bottom: 25px;">
        <h2 style="font-family: 'Playfair Display'; color: var(--rose-deep);">Yassmine Golden Care</h2>
        <p style="color: var(--text-soft);">مرحباً بكِ مجدداً</p>
    </div>
    
    <div class="stat-card">
        <div class="stat-value" id="total-patients">124</div>
        <div class="stat-label">إجمالي المرضى</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">8</div>
        <div class="stat-label">جلسات اليوم</div>
    </div>
</div>

<div id="patients" class="page">
    <div class="panel">
        <div class="panel-head">قائمة المرضى</div>
        <div class="panel-body">
            <input type="text" class="form-control" placeholder="ابحثي عن مريضة...">
            <div id="list-container" style="margin-top: 15px;">
                <p style="text-align: center; color: var(--text-soft);">لا يوجد مرضى حالياً</p>
            </div>
        </div>
    </div>
</div>

<div id="add-patient" class="page">
    <div class="panel">
        <div class="panel-head">إضافة مريضة جديدة</div>
        <div class="panel-body">
            <label>اسم المريضة</label>
            <input type="text" id="name" class="form-control" placeholder="أدخلي الاسم">
            <label>رقم الهاتف</label>
            <input type="tel" id="phone" class="form-control" placeholder="05/06/07...">
            <label>السعر الافتراضي للجلسة</label>
            <input type="number" id="price" class="form-control" placeholder="0.00">
            <button class="btn-main" onclick="addNewPatient()">حفظ المريضة</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage('home', this)">
        <i class="fas fa-chart-pie"></i>
        <span>الرئيسية</span>
    </div>
    
    <div class="nav-item" onclick="showPage('patients', this)">
        <i class="fas fa-users"></i>
        <span>المرضى</span>
    </div>

    <div class="nav-add-btn" onclick="showPage('add-patient', this)">
        <i class="fas fa-plus"></i>
    </div>

    <div class="nav-item">
        <i class="fas fa-calendar-alt"></i>
        <span>المواعيد</span>
    </div>

    <div class="nav-item">
        <i class="fas fa-cog"></i>
        <span>إعدادات</span>
    </div>
</nav>

<script>
function showPage(pageId, element) {
    // إخفاء كل الصفحات
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    // إظهار الصفحة المطلوبة
    document.getElementById(pageId).classList.add('active');
    
    // تحديث شكل الأزرار
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    if(element.classList.contains('nav-item')) {
        element.classList.add('active');
    }
}

function addNewPatient() {
    let name = document.getElementById('name').value;
    if(name) {
        alert("تم إضافة المريضة: " + name);
        showPage('patients', document.querySelector('.nav-item:nth-child(2)'));
    } else {
        alert("يرجى إدخال الاسم");
    }
}
</script>

</body>
</html>
