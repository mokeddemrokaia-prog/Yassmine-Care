<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yassmine Golden Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --main-gradient: linear-gradient(135deg, #b83b5e 0%, #6a2c70 100%);
            --rose-pale: #fdf0f4;
            --text-dark: #2d1a24;
            --rose-deep: #d4748e;
            --shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background-color: #faf6f8; color: var(--text-dark); padding-bottom: 90px; }

        /* HEADER */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: white; }
        .header-icons { display: flex; gap: 15px; }
        .header-icons i { font-size: 20px; color: #333; }

        /* MAIN CARD - روح كلوود */
        .hero-card {
            margin: 15px;
            padding: 25px;
            background: var(--main-gradient);
            border-radius: 25px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(184, 59, 94, 0.3);
        }
        .hero-card::before {
            content: "✦"; position: absolute; top: 10px; left: 20px; font-size: 40px; opacity: 0.2;
        }
        .hero-title { font-size: 0.9rem; opacity: 0.9; text-align: left; display: flex; align-items: center; justify-content: flex-end; gap: 5px; }
        .hero-value { font-size: 2.5rem; font-weight: 800; text-align: center; margin: 15px 0; }
        .hero-stats { display: grid; grid-template-columns: 1fr 1fr; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .hero-stat-item { text-align: center; }
        .hero-stat-num { display: block; font-size: 1.2rem; font-weight: 700; }
        .hero-stat-label { font-size: 0.7rem; opacity: 0.8; }

        /* GRID STATS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .small-card {
            background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow);
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }
        .small-card::after {
            content: ""; position: absolute; top: -10px; right: -10px; width: 50px; height: 50px; border-radius: 50%;
        }
        .card-1::after { background: #f0e0c0; opacity: 0.5; }
        .card-2::after { background: #f5d0dc; opacity: 0.5; }
        
        .small-card-num { font-size: 1.8rem; font-weight: 800; color: #333; }
        .small-card-label { font-size: 0.75rem; color: #888; margin-top: 5px; }
        .card-icon { font-size: 1.5rem; margin-bottom: 10px; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #eee; box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .nav-link { text-align: center; color: #b08898; text-decoration: none; transition: 0.3s; flex: 1; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-link span { font-size: 11px; font-weight: 600; }
        .nav-link.active { color: var(--rose-deep); }

        /* PAGES */
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-icons">
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-user-circle"></i>
        </div>
        <div style="font-weight: 700;">لوحة التحكم</div>
    </div>

    <div id="home" class="page active">
        <div class="hero-card">
            <div class="hero-title">صافي الربح الإجمالي 💰</div>
            <div class="hero-value">0</div>
            <div style="text-align: center; font-size: 0.8rem; opacity: 0.8; margin-bottom: 10px;">دينار جزائري</div>
            <div class="hero-stats">
                <div class="hero-stat-item">
                    <span class="hero-stat-num">0</span>
                    <span class="hero-stat-label">إجمالي الإيرادات دج</span>
                </div>
                <div class="hero-stat-item">
                    <span class="hero-stat-num">0</span>
                    <span class="hero-stat-label">إجمالي المصاريف دج</span>
                </div>
            </div>
            <div style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                <strong>0</strong> جلسة مسجلة
            </div>
        </div>

        <div class="stats-grid">
            <div class="small-card card-1">
                <span class="small-card-num">1</span>
                <span class="small-card-label">خدمة متاحة</span>
            </div>
            <div class="small-card card-2">
                <span class="small-card-num">1</span>
                <span class="small-card-label">مريضة مسجلة</span>
            </div>
            <div class="small-card">
                <div class="card-icon">💸</div>
                <span class="small-card-num">0</span>
                <span class="small-card-label">مصروف مسجل</span>
            </div>
            <div class="small-card">
                <div class="card-icon">📅</div>
                <span class="small-card-num">0</span>
                <span class="small-card-label">مواعيد قادمة</span>
            </div>
        </div>
    </div>

    <div id="patients" class="page" style="padding: 20px;">
        <h3 style="margin-bottom: 20px;">قائمة المريضات</h3>
        <div style="background: white; padding: 15px; border-radius: 15px; box-shadow: var(--shadow);">
            <p style="color: #888; text-align: center;">لا يوجد بيانات لعرضها</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active" onclick="showPage('home', this)">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
        </a>
        <a href="#" class="nav-link" onclick="showPage('patients', this)">
            <i class="fa-solid fa-users"></i>
            <span>المرضى</span>
        </a>
        <a href="#" class="nav-link">
            <i class="fa-solid fa-calendar-days"></i>
            <span>الجلسات</span>
        </a>
        <a href="#" class="nav-link">
            <i class="fa-solid fa-gear"></i>
            <span>إعدادات</span>
        </a>
    </nav>

    <script>
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
