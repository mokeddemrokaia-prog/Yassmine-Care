<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yassmine Golden Care ✦</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --main-gradient: linear-gradient(135deg, #b83b5e 0%, #6a2c70 100%);
            --rose-deep: #d4748e;
            --text-dark: #2d1a24;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background-color: #faf6f8; color: var(--text-dark); padding-bottom: 100px; }

        /* HEADER */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 100; }
        .header-icons { display: flex; gap: 15px; }

        /* HERO CARD (CLOUD STYLE) */
        .hero-card {
            margin: 15px; padding: 25px; background: var(--main-gradient);
            border-radius: 25px; color: white; position: relative; overflow: hidden; box-shadow: 0 15px 30px rgba(184, 59, 94, 0.3);
        }
        .hero-card::before { content: "✦"; position: absolute; top: 10px; left: 20px; font-size: 40px; opacity: 0.2; }
        .hero-title { font-size: 0.9rem; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 5px; }
        .hero-value { font-size: 2.6rem; font-weight: 800; text-align: center; margin: 10px 0; }
        .hero-stats { display: grid; grid-template-columns: 1fr 1fr; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .hero-stat-item { text-align: center; }

        /* GRID STATS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .small-card {
            background: white; padding: 15px; border-radius: 20px; box-shadow: var(--shadow);
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        .small-card-num { font-size: 1.6rem; font-weight: 800; }
        .small-card-label { font-size: 0.75rem; color: #888; }
        .icon-bg { position: absolute; top: 5px; right: 10px; font-size: 1.2rem; opacity: 0.8; }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px 0 25px; border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-btn { text-align: center; color: #b08898; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-btn.active { color: var(--rose-deep); }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-btn span { font-size: 10px; font-weight: 600; }

        /* الزر الكبير للإضافة */
        .add-main-btn {
            background: var(--main-gradient); width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px; margin-top: -45px; border: 5px solid #faf6f8;
            box-shadow: 0 8px 20px rgba(184, 59, 94, 0.4);
        }

        /* MODAL (FOR ADDING STUFF) */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; }
        .modal-content h3 { margin-bottom: 20px; color: var(--rose-deep); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; font-family: 'Tajawal'; }
        .btn-save { width: 100%; padding: 12px; background: var(--main-gradient); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .page { display: none; padding: 15px; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-icons"><i class="fa-solid fa-bell"></i> <i class="fa-solid fa-circle-user"></i></div>
        <div style="font-weight: 800;">Yassmine Golden Care</div>
    </div>

    <div id="home-page" class="page active">
        <div class="hero-card">
            <div class="hero-title">صافي الربح الإجمالي 💰</div>
            <div class="hero-value" id="total-profit">0</div>
            <div style="text-align: center; font-size: 0.8rem; opacity: 0.8;">دينار جزائري</div>
            <div class="hero-stats">
                <div class="hero-stat-item"><span id="total-revenue">0</span><br><small>إيرادات</small></div>
                <div class="hero-stat-item"><span id="total-expenses">0</span><br><small>مصاريف</small></div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="small-card">
                <span class="icon-bg">👩‍⚕️</span>
                <span class="small-card-num" id="patient-count">0</span>
                <span class="small-card-label">مريضة مسجلة</span>
            </div>
            <div class="small-card">
                <span class="icon-bg">📅</span>
                <span class="small-card-num" id="appointment-count">0</span>
                <span class="small-card-label">مواعيد قادمة</span>
            </div>
        </div>
    </div>

    <div id="patients-page" class="page">
        <h3 style="margin-bottom:15px">قائمة المرضى</h3>
        <div id="patients-list"></div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">إضافة مريضة</h3>
            <div id="form-container">
                <div id="form-patient">
                    <input type="text" id="p-name" placeholder="اسم المريضة">
                    <input type="tel" id="p-phone" placeholder="رقم الهاتف">
                    <button class="btn-save" onclick="savePatient()">حفظ المريضة</button>
                </div>
                <div id="form-session" style="display:none">
                    <select id="s-patient"></select>
                    <input type="number" id="s-price" placeholder="سعر الجلسة (دج)">
                    <button class="btn-save" onclick="saveSession()">تسجيل الجلسة</button>
                </div>
            </div>
            <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:gray; width:100%">إلغاء</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="showPage('home-page', this)"><i class="fa-solid fa-house"></i><span>الرئيسية</span></div>
        <div class="nav-btn" onclick="showPage('patients-page', this)"><i class="fa-solid fa-users"></i><span>المرضى</span></div>
        
        <div class="add-main-btn" onclick="openAddMenu()">
            <i class="fa-solid fa-plus"></i>
        </div>

        <div class="nav-btn"><i class="fa-solid fa-calendar-check"></i><span>المواعيد</span></div>
        <div class="nav-btn"><i class="fa-solid fa-gear"></i><span>إعدادات</span></div>
    </nav>

    <script>
        let db = { patients: [], sessions: [], appointments: [] };

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function openAddMenu() {
            document.getElementById('add-modal').classList.add('active');
            document.getElementById('form-patient').style.display = 'block';
            document.getElementById('form-session').style.display = 'none';
            document.getElementById('modal-title').innerText = "إضافة مريضة جديدة";
        }

        function closeModal() { document.getElementById('add-modal').classList.remove('active'); }

        function savePatient() {
            let name = document.getElementById('p-name').value;
            let phone = document.getElementById('p-phone').value;
            if(!name) return alert("أدخلي الاسم");
            
            db.patients.push({name, phone});
            updateDashboard();
            closeModal();
            alert("تم الحفظ بنجاح ✦");
        }

        function updateDashboard() {
            document.getElementById('patient-count').innerText = db.patients.length;
            let list = document.getElementById('patients-list');
            list.innerHTML = db.patients.map(p => `<div style="background:white; padding:15px; border-radius:15px; margin-bottom:10px; box-shadow:var(--shadow)"><b>${p.name}</b><br><small>${p.phone}</small></div>`).join('');
            
            // تحديث قائمة الأسماء في نافذة الجلسات
            let select = document.getElementById('s-patient');
            select.innerHTML = db.patients.map(p => `<option>${p.name}</option>`).join('');
        }

        // تحويل الزر لفتح إضافة جلسة (كمثال)
        function openSessionAdd() {
            document.getElementById('form-patient').style.display = 'none';
            document.getElementById('form-session').style.display = 'block';
            document.getElementById('modal-title').innerText = "تسجيل جلسة/سعر";
        }
    </script>
</body>
</html>
